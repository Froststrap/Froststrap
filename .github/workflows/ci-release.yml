name: CI (Release)
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            just_target: ci-publish-windows
          - os: macos-latest
            just_target: ci-publish-macos
          - os: ubuntu-latest
            just_target: ci-publish-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        uses: negrutiu/nsis-install@v2

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Build and package
        run: just ${{ matrix.just_target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Froststrap (Release) (${{ matrix.os }}) (${{ github.sha }})
          path: build/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Froststrap (Release) (windows-latest) (${{ github.sha }})
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Froststrap (Release) (macos-latest) (${{ github.sha }})
          path: release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Froststrap (Release) (ubuntu-latest) (${{ github.sha }})
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: true
          files: |
            release/Froststrap-${{ github.ref_name }}.exe
            release/Froststrap-macOS-arm64-${{ github.ref_name }}.zip
            release/Froststrap-linux-x64-${{ github.ref_name }}
          name: Froststrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
