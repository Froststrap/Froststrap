name: CI (Debug)
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            rid: win-x64
            just_target: debug-windows
          - os: macos-latest
            rid: osx-arm64
            just_target: debug-macos
          - os: ubuntu-latest
            rid: linux-x64
            just_target: debug-linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Just
        uses: extractions/setup-just@v3

      - name: Publish
        run: just ${{ matrix.just_target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Froststrap (Debug) (${{ matrix.os }}) (${{ github.sha }})
          path: Froststrap/bin/Debug/net10.0/${{ matrix.rid }}/publish/*
